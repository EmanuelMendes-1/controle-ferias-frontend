<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — Controle de Férias</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="pagina-login">
    <div class="login-card">
        <div class="login-header">
            <h1>Controle de Férias</h1>
            <p>Entre com seu usuário do sistema</p>
        </div>
        <form id="form-login" class="login-form">
            <label>
                Usuário
                <input type="text" id="login-usuario" autocomplete="username" required placeholder="ex: admin">
            </label>
            <label>
                Senha
                <input type="password" id="login-senha" autocomplete="current-password" required placeholder="••••••••">
            </label>
            <button type="submit" class="btn-login">Entrar</button>
        </form>
        <p class="login-dica">Padrão: <code>admin</code> / <code>admin123</code></p>
    </div>
    <div id="toast" class="toast hidden"></div>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
